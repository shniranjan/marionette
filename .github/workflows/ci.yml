name: Marionette CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust: cargo check, test, clippy, fmt ── (matrix: x86_64 + aarch64)
  rust:
    name: Rust (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo check (workspace)
        run: cargo check --workspace --target ${{ matrix.target }}

      - name: Cargo test (workspace)
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Cargo clippy
        run: cargo clippy --workspace --target ${{ matrix.target }} -- -D warnings

      - name: Cargo fmt
        run: cargo fmt --all -- --check

  # ── Gateway: Node.js build check ──
  gateway:
    name: Gateway — build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install
        working-directory: gateway
        run: npm ci

      - name: Build
        working-directory: gateway
        run: npm run build

  # ── Frontend: Vite build check (JSX project — build validates code) ──
  frontend:
    name: Frontend — build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Docker: multi-arch build (test-only, no push on PR) ──
  docker:
    name: Docker multi-arch build test
    runs-on: ubuntu-latest
    needs: [rust, gateway, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-arch (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Release: build + push to ghcr.io on main push ──
  release:
    name: Release to GHCR
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [rust, gateway, frontend, docker]
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/nous/marionette:latest
            ghcr.io/nous/marionette:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
