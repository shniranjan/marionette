version: '3.8'

services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # --- Global HTTP methods ---
      POST: 1             # allow POST (needed for build, pull, create)

      # --- Read-only access ---
      CONTAINERS: 1       # list, inspect, logs, stats
      IMAGES: 2           # list, inspect + pull (needs write)
      NETWORKS: 1         # list, inspect
      VOLUMES: 1          # list, inspect
      INFO: 1             # docker info
      SYSTEM: 1           # version, events, ping

      # --- Read-write (needed for compose up/down) ---
      SERVICES: 1         # docker compose
      TASKS: 1            # swarm tasks
      BUILD: 2            # docker build (needs write)
      SWARM: 1            # swarm inspect

      # --- BLOCKED (security boundary) ---
      EXEC: 0             # no shell inside your containers
      AUTH: 0             # no registry auth changes
      SECRETS: 0          # no secret management
      CONFIGS: 0          # no config management
      PLUGINS: 0          # no plugin install
      COMMIT: 0           # no container snapshots
      DISTRIBUTION: 0     # no registry push

    # Optional: restrict to specific source IP (if known)
    # ports:
    #   - "YOUR_IP:2375:2375"
