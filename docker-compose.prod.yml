# Production deployment: marionette core + gateway on .59, relay agent on .17
# Run on .59:
#   docker compose -f docker-compose.prod.yml up -d
# Run on .17:
#   docker compose -f docker-compose.prod.yml --profile relay up -d

version: "3.9"

services:
  # ── Marionette (core + gateway + frontend) ──
  marionette:
    image: marionette:0.9.0
    # For GHCR: ghcr.io/nous/marionette:latest
    container_name: marionette
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - marionette_data:/opt/marionette/data
      - /opt/stacks:/opt/stacks
    environment:
      - MARIONETTE_PORT=9199
      - MARIONETTE_GATEWAY_PORT=3001
      - RUST_LOG=info
      - MARIONETTE_RELAY_ADDR=0.0.0.0:9121
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9199/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Relay Agent (sidecar on .17) ──
  relay-agent:
    image: marionette:0.9.0
    # For GHCR: ghcr.io/nous/marionette:latest
    container_name: relay-agent
    command: relay-agent
    ports:
      - "9120:9120"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/stacks:/opt/stacks
      - relay_data:/opt/marionette/data
    environment:
      - MARIONETTE_URL=ws://192.168.1.59:9199/relay
      - MARIONETTE_TOKEN=${RELAY_TOKEN:?RELAY_TOKEN required}
      - RELAY_PORT=9120
      - MARIONETTE_RELAY_ADDR=0.0.0.0:9120
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9120/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - relay

volumes:
  marionette_data:
  relay_data:
