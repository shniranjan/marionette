[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:marionette-core]
command=/usr/local/bin/marionette-core
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=MARIONETTE_PORT="9119",MARIONETTE_RELAY_ADDR="0.0.0.0:9120",RUST_LOG="info"

[program:frontend-server]
command=/bin/sh -c "cd /opt/marionette/frontend && python3 -m http.server 3000"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
