# relay-agent — Marionette sidecar for Docker host operations
# Usage:
#   docker compose -f docker-compose.relay.yml up -d

services:
  relay-agent:
    image: relay-agent:latest
    container_name: relay-agent
    restart: unless-stopped
    networks:
      - marionette_marionette-net
      - hermesagent_default
    volumes:
      - /home/niranjan/dockerComposer:/stacks:ro
    environment:
      RUST_LOG: info
      MARIONETTE_URL: wss://marionette:8443/api/relay
      DOCKER_HOST: http://socket-proxy:2375
      # RELAY_TOKEN: "your-token-here"

networks:
  marionette_marionette-net:
    external: true
  hermesagent_default:
    external: true
