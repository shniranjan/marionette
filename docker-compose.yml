services:
  marionette:
    build: .
    image: marionette:local
    container_name: marionette
    ports:
      - "8000:8000"
      - "8443:8443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/niranjan/dockerComposer:/stacks
      - /srv/docker_config/marionette/data:/data
      # Persist TLS certs (endpoint client certs + gateway auto-TLS)
      - /srv/docker_config/marionette/certs:/app/certs
    environment:
      - MARIONETTE_KEY=${MARIONETTE_KEY:-}
      - MARIONETTE_STACKS_DIR=${MARIONETTE_STACKS_DIR:-/stacks}
      - MARIONETTE_LOG_LEVEL=${MARIONETTE_LOG_LEVEL:-info}
      - MARIONETTE_DB_PATH=${MARIONETTE_DB_PATH:-/data/marionette.db}
    restart: unless-stopped
    networks:
      - marionette-net

networks:
  marionette-net:
    driver: bridge
